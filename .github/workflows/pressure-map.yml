name: Generate pressure map

on:
  schedule:
    # Nur 1× pro Tag am Abend — Folgetag-Karte aus 12Z-Modelllauf.
    - cron: "15 17 * * *"  # 17:15 UTC (18:15/19:15 CH) — Abend-Slot, 12Z-Modelllauf
  workflow_dispatch:

concurrency:
  group: pressure-map
  cancel-in-progress: false

env:
  # Opt into the new Node 24 runtime for JavaScript actions ahead of the
  # June 2026 forced switch — silences the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        working-directory: pressure-map-generator
        run: npm ci --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Generate and upload map
        working-directory: pressure-map-generator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
          FORCE_REGENERATE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: node generate.mjs
