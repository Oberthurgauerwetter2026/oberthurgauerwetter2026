name: Generate pressure map

on:
  schedule:
    # Drei Slots pro Tag — GitHub-Free-Cron ist nicht garantiert pünktlich,
    # mit mehreren Slots + Skip-Logik im Generator wird die Karte zuverlässig aktuell gehalten.
    - cron: "15 4 * * *"   # 04:15 UTC (05:15/06:15 CH) — primärer Morgen-Slot, 00Z-Modelllauf
    - cron: "15 7 * * *"   # 07:15 UTC (08:15/09:15 CH) — Backup, 06Z-Modelllauf
    - cron: "15 17 * * *"  # 17:15 UTC (18:15/19:15 CH) — Abend-Slot für Folgetag-Karte, 12Z-Modelllauf
  workflow_dispatch:

concurrency:
  group: pressure-map
  cancel-in-progress: false

env:
  # Opt into the new Node 24 runtime for JavaScript actions ahead of the
  # June 2026 forced switch — silences the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        working-directory: pressure-map-generator
        run: npm ci --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Generate and upload map
        working-directory: pressure-map-generator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: node generate.mjs
