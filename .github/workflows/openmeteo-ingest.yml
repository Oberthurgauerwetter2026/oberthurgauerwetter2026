name: Open-Meteo Cache Ingest

on:
  schedule:
    - cron: "*/5 * * * *"
    # Mitternachts-Rollover (UTC) absichern: kurz nach 00:00 mehrmals nachfassen,
    # damit der erste Datensatz des neuen Tages garantiert in R2 landet —
    # auch wenn der reguläre Lauf in einen DNS-Glitch des Runners fällt.
    - cron: "1,3,6,10,15 0 * * *"
  workflow_dispatch: {}

concurrency:
  group: openmeteo-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: Run ingest (with retries)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 60
          command: python -u scripts/ingest_openmeteo.py
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
